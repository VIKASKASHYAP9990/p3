<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Real-Time Data Analytics Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
      
      /* Loading screen styles */
      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #0e1117;
        color: #ffffff;
        font-family: 'Outfit', sans-serif;
        text-align: center;
        padding: 20px;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.1);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border-left-color: #6366f1;
        animation: spin 1s linear infinite;
        margin-bottom: 25px;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      h2 {
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }
      p {
        color: #9ca3af;
        font-size: 0.95rem;
        max-width: 400px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <h2>Starting Dashboard Environment...</h2>
      <p>Initializing Python WebAssembly (Pyodide) directly inside your browser. This may take a few seconds on the first load.</p>
    </div>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      async function main() {
        try {
          const [appPy, dataProviderPy] = await Promise.all([
            fetch('app.py').then(res => {
              if (!res.ok) throw new Error('Failed to load app.py');
              return res.text();
            }),
            fetch('data_provider.py').then(res => {
              if (!res.ok) throw new Error('Failed to load data_provider.py');
              return res.text();
            })
          ]);

          // Hide loading spinner
          document.getElementById('loading').style.display = 'none';

          stlite.mount(
            {
              requirements: ["pandas", "plotly", "requests"],
              entrypoint: "app.py",
              files: {
                "app.py": appPy,
                "data_provider.py": dataProviderPy
              },
            },
            document.getElementById("root")
          );
        } catch (err) {
          console.error(err);
          document.getElementById('loading').innerHTML = `
            <div style="font-size: 3rem; margin-bottom: 20px;">⚠️</div>
            <h2 style="color: #ef4444;">Failed to load the dashboard</h2>
            <p>${err.message}</p>
            <p style="font-size: 0.8rem; margin-top: 20px; color: #6b7280;">Check the browser console logs for details.</p>
          `;
        }
      }
      main();
    </script>
  </body>
</html>
